title: SDKs
description: A curated index of services, tooling, and open source solutions for generating
  API SDKs, client libraries, and code from API specifications. This collection covers
  SDK generation platforms, open source code generators, RPC frameworks, and schema-driven
  toolchains across the SDK lifecycle stop.
url: https://sdk.apievangelist.com
collections:
  api_stories:
    output: false
exclude:
- README.md
- Gemfile
- Gemfile.lock
- Dockerfile
- examples
- json-ld
- json-schema
- json-structure
- vocabulary
